<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Detalhamento Declara Agua</title>
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/vendor.css">
    <script src="js/vendor.js"></script>

    <script src="js/main2.js"></script>
    <!--script src="js/main.js"></script-->

    <script src="js/demo.js"></script>
    <script src="js/ie.js"></script>

    <link rel="stylesheet" type="text/css" href="css/font-awesome.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="js/jquery-3.5.1.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/jquery.dataTables.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f11;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Lato', 'sans-serif';
        }

        #borda {
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65);
            overflow: hidden;
            background: #141416;
            width: 660px;
            height: 880px;
            position: relative;
        }

        #zoom-img {
            cursor: move;
            position: relative;
            width: 660px;
            height: 880px;
            transition: transform 0.1s ease-out;
        }

        #zoom-container {
            background: #141416;
            width: 660px;
            height: 880px;
            text-align: center;
            position: relative;
        }

        /* Barra de ferramentas flutuante em Glassmorphism */
        .floating-toolbar {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(22, 22, 26, 0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 10px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: flex;
            gap: 10px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .floating-toolbar:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.7);
        }

        /* Estilo premium para os botões circulares */
        .toolbar-btn {
            background: rgba(255, 255, 255, 0.07);
            border: none;
            color: #e2e8f0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .toolbar-btn i {
            font-size: 1.25em;
            transition: transform 0.2s ease;
        }

        .toolbar-btn:hover {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #ffffff;
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.45);
        }

        .toolbar-btn:hover i {
            transform: scale(1.1);
        }

        .toolbar-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Divisor entre categorias de botões */
        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }
    </style>

    <script>
        function carregar_imagem() {
            const urlParams = new URLSearchParams(window.location.search);
            id_foto = urlParams.get('id');
            new_img = "https://ana.serpro.gov.br/fisc-declaratorio-distribuicao/imagens/" + id_foto;
            document.getElementById("zoom-img").src = new_img;
        }
    </script>

</head>

<body onload="carregar_imagem()">
    <div id="borda">
        <div id="zoom-container">
            <img ondragstart="return false" id="zoom-img"
                src="https://ana.serpro.gov.br/fisc-declaratorio-distribuicao/imagens/">
        </div>
    </div>

    <!-- Barra de Ferramentas Flutuante -->
    <div class="floating-toolbar">
        <button type="button" id="zoomin" class="toolbar-btn" title="Aproximar Zoom (Zoom In)">
            <i class="fa fa-fw fa-search-plus"></i>
        </button>
        <button type="button" id="zoomout" class="toolbar-btn" title="Afastar Zoom (Zoom Out)">
            <i class="fa fa-fw fa-search-minus"></i>
        </button>

        <div class="toolbar-separator"></div>

        <button type="button" id="rotateS" class="toolbar-btn" title="Girar para Esquerda">
            <i class="fa fa-fw fa-rotate-left"></i>
        </button>
        <button type="button" id="rotate" class="toolbar-btn" title="Girar para Direita">
            <i class="fa fa-fw fa-rotate-right"></i>
        </button>

        <div class="toolbar-separator"></div>

        <button type="button" onclick="stretchImageWidth()" class="toolbar-btn" title="Corrigir Distorção: Esticar Largura">
            <i class="fa fa-fw fa-arrows-h"></i>
        </button>
        <button type="button" onclick="stretchImageHeight()" class="toolbar-btn" title="Corrigir Distorção: Esticar Altura">
            <i class="fa fa-fw fa-arrows-v"></i>
        </button>

        <div class="toolbar-separator"></div>

        <button type="button" id="zoomzero" class="toolbar-btn" title="Restaurar Padrão (Reset)">
            <i class="fa fa-fw fa-refresh"></i>
        </button>
    </div>

    <!-- script zoom da imagem do modal -->
    <script src="js/zoom_pan_conteiner.js"></script>

    <!-- Manipulação da Imagem (zoom, pan, restore) -->
    <script>
        document.getElementById('zoomin').addEventListener('click', function () { zoomer.zoom(0.05); });
        document.getElementById('zoomout').addEventListener('click', function () { zoomer.zoom(-0.05); });
        document.getElementById('zoom-img').addEventListener('mousedown', zoomer.start_drag);
        document.getElementById('zoom-container').addEventListener('mousemove', zoomer.while_drag);
        document.getElementById('zoom-container').addEventListener('mouseup', zoomer.stop_drag);
        document.getElementById('zoom-container').addEventListener('mouseout', zoomer.stop_drag);

        document.getElementById('zoomzero').addEventListener('click', function () {
            rotation = 0;
            document.getElementById('zoom-img').style.transform = "rotate(0deg)";
            document.getElementById('zoom-img').style.top = '0px';
            document.getElementById('zoom-img').style.left = '0px';
            document.getElementById('zoom-img').style.width = '660px';
            document.getElementById('zoom-img').style.height = '880px';
        });

        rotation = 0;
        document.getElementById('rotate').addEventListener('click', function () {
            rotation += 10;
            if (rotation === 360) { rotation = 0; };
            document.getElementById('zoom-img').style.transform = "rotate(" + rotation + "deg)";
        });
        document.getElementById('rotateS').addEventListener('click', function () {
            rotation = rotation - 10;
            if (rotation < 0) { rotation = 350; };
            document.getElementById('zoom-img').style.transform = "rotate(" + rotation + "deg)";
        });

        function stretchImageWidth() {
            var activeImg = document.getElementById('zoom-img');
            if (activeImg) {
                var currentWidth = activeImg.style.width || activeImg.width || '660px';
                var numericWidth = parseFloat(currentWidth);
                var newWidth = numericWidth + 60;
                activeImg.style.width = newWidth + 'px';
            }
        }

        function stretchImageHeight() {
            var activeImg = document.getElementById('zoom-img');
            if (activeImg) {
                var currentHeight = activeImg.style.height || activeImg.height || '880px';
                var numericHeight = parseFloat(currentHeight);
                var newHeight = numericHeight + 60;
                activeImg.style.height = newHeight + 'px';
            }
        }
    </script>

</body>

</html>
